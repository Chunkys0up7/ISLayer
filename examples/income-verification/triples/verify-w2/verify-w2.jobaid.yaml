jobaid_id: JA-IV-VW2-001
title: W-2 Income Verification Decision Table
capsule_id: CAP-IV-VW2-001
version: "1.0"
status: current
description: >
  Condition/action lookup table for W-2 income verification. Determines
  required documentation, calculation method, thresholds, and regulatory
  references based on loan program, income type, and employment duration.

dimensions:
  - name: loan_program
    values: [FHA, Conventional, VA, USDA]
    description: The loan program under which the application is being processed
  - name: income_type
    values: [base_salary, overtime, bonus, commission, tips]
    description: The category of income being verified from the W-2
  - name: employment_duration
    values: [less_than_2_years, 2_years_or_more]
    description: Length of time the borrower has been employed at the current employer

rules:
  # ============================================================
  # FHA - base_salary
  # ============================================================
  - id: R-001
    conditions:
      loan_program: FHA
      income_type: base_salary
      employment_duration: 2_years_or_more
    action:
      documentation_required:
        - Most recent W-2
        - Most recent paystub covering 30-day period
      calculation_method: current_annualized
      threshold: null
      regulatory_ref: FHA 4000.1 II.A.4.c.ii

  - id: R-002
    conditions:
      loan_program: FHA
      income_type: base_salary
      employment_duration: less_than_2_years
    action:
      documentation_required:
        - Most recent W-2
        - Most recent paystub covering 30-day period
        - Prior employer verification or school transcripts if gap exists
      calculation_method: current_annualized
      threshold: null
      regulatory_ref: FHA 4000.1 II.A.4.c.iii

  # ============================================================
  # FHA - overtime
  # ============================================================
  - id: R-003
    conditions:
      loan_program: FHA
      income_type: overtime
      employment_duration: 2_years_or_more
    action:
      documentation_required:
        - 2 years W-2s
        - Most recent paystub covering 30-day period
        - Written VOE confirming overtime likely to continue
      calculation_method: 2_year_average
      threshold: null
      regulatory_ref: FHA 4000.1 II.A.4.c.viii

  - id: R-004
    conditions:
      loan_program: FHA
      income_type: overtime
      employment_duration: less_than_2_years
    action:
      documentation_required:
        - All available W-2s
        - Most recent paystub covering 30-day period
        - Written VOE confirming overtime likely to continue
      calculation_method: ytd_annualized_if_trending_upward
      threshold: "12 months minimum history required"
      regulatory_ref: FHA 4000.1 II.A.4.c.viii

  # ============================================================
  # FHA - bonus
  # ============================================================
  - id: R-005
    conditions:
      loan_program: FHA
      income_type: bonus
      employment_duration: 2_years_or_more
    action:
      documentation_required:
        - 2 years W-2s
        - Most recent paystub covering 30-day period
        - Employer written confirmation bonus likely to continue
      calculation_method: 2_year_average
      threshold: null
      regulatory_ref: FHA 4000.1 II.A.4.c.viii

  - id: R-006
    conditions:
      loan_program: FHA
      income_type: bonus
      employment_duration: less_than_2_years
    action:
      documentation_required:
        - All available W-2s
        - Most recent paystub covering 30-day period
        - Employer written confirmation bonus likely to continue
      calculation_method: ytd_annualized_if_trending_upward
      threshold: "12 months minimum history required"
      regulatory_ref: FHA 4000.1 II.A.4.c.viii

  # ============================================================
  # FHA - commission
  # ============================================================
  - id: R-007
    conditions:
      loan_program: FHA
      income_type: commission
      employment_duration: 2_years_or_more
    action:
      documentation_required:
        - 2 years W-2s
        - 2 years signed federal tax returns (1040)
        - Most recent paystub covering 30-day period
      calculation_method: 2_year_average
      threshold: "If commission > 25% of total income, 2-year history mandatory"
      regulatory_ref: FHA 4000.1 II.A.4.c.ix

  - id: R-008
    conditions:
      loan_program: FHA
      income_type: commission
      employment_duration: less_than_2_years
    action:
      documentation_required:
        - All available W-2s
        - Signed federal tax returns (1040) for available years
        - Most recent paystub covering 30-day period
      calculation_method: not_eligible_unless_same_field
      threshold: "Must demonstrate prior employment in same field; 2-year history preferred"
      regulatory_ref: FHA 4000.1 II.A.4.c.ix

  # ============================================================
